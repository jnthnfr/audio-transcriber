# Render Blueprint — deploys the frontend as a free static site.
# The backend is hosted separately on a Hugging Face Space (see backend/README.md).
# Set VITE_API_BASE_URL in the Render dashboard to your Space URL,
# e.g. https://<username>-audio-transcriber.hf.space
services:
  - type: web
    name: audio-transcriber-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
